name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
      - uses: flatt-security/setup-takumi-guard-npm@v1
      - run: npm ci
      - run: npm run format:check
      - run: npm run test
      - run: npm run build:prod
